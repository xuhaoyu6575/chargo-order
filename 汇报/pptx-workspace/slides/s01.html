<!DOCTYPE html><html><head><style>
html { background: #020617; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; color: #f8fafc;
  display: flex; flex-direction: column;
  background: #020617;
}
.accent { position: absolute; top: 0; left: 0; width: 720pt; height: 3pt; background: #0ea5e9; }
.content { flex: 1; display: flex; flex-direction: column; padding: 32pt 40pt 24pt 40pt; }
.content-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32pt 40pt 24pt 40pt; text-align: center; }
h1 { font-size: 32pt; font-weight: 800; color: #0ea5e9; margin: 0 0 8pt 0; font-family: Impact, Arial, sans-serif; letter-spacing: 1px; }
h2 { font-size: 22pt; font-weight: 700; color: #0ea5e9; margin: 0 0 6pt 0; }
h3 { font-size: 14pt; font-weight: 700; margin: 0 0 4pt 0; }
h4 { font-size: 12pt; font-weight: 700; margin: 0 0 3pt 0; }
p { font-size: 11pt; color: #cbd5e1; margin: 0 0 4pt 0; line-height: 1.5; }
ul { margin: 0; padding-left: 16pt; }
li { font-size: 10pt; color: #cbd5e1; margin-bottom: 3pt; line-height: 1.4; }
.row { display: flex; gap: 12pt; }
.col { flex: 1; display: flex; flex-direction: column; }
.card { background: #0f172a; border: 1px solid #1e293b; padding: 12pt; border-left: 3pt solid #0ea5e9; position: relative; }
.card-glow { background: #0f172a; border: 1px solid #0ea5e9; padding: 12pt; position: relative; box-shadow: inset 0 0 10pt rgba(14,165,233,0.1); }
.card::before, .card-glow::before { content: ""; position: absolute; top: -1px; left: -1px; width: 6pt; height: 6pt; border-top: 2px solid #0ea5e9; border-left: 2px solid #0ea5e9; }
.card::after, .card-glow::after { content: ""; position: absolute; bottom: -1px; right: -1px; width: 6pt; height: 6pt; border-bottom: 2px solid #0ea5e9; border-right: 2px solid #0ea5e9; }
.sub-box { background: #000000; border: 1px solid #1e293b; padding: 8pt; margin-top: 4pt; border-left: 2px solid #8b5cf6; }
.badge { display: inline-block; font-size: 8pt; font-weight: 700; padding: 2pt 8pt; border-radius: 0; text-transform: uppercase; letter-spacing: 1px; }
.badge-cyan { color: #0ea5e9; }
.badge-orange { color: #f59e0b; }
.badge-purple { color: #8b5cf6; }
.badge-bg-cyan { background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.7); padding: 2pt 8pt; display: inline-block; }
.badge-bg-orange { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.7); padding: 2pt 8pt; display: inline-block; }
.badge-bg-purple { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.7); padding: 2pt 8pt; display: inline-block; }
.tag-wrap { display: inline-block; padding: 1pt 6pt; border-radius: 0; border: 1px solid currentColor; margin-right: 4pt; }
.tag { font-size: 8pt; font-weight: 600; text-transform: uppercase; font-family: "Courier New", Courier, monospace;}
.section-num { position: absolute; top: 12pt; right: 40pt; font-size: 56pt; font-weight: 800; color: rgba(14,165,233,0.06); font-family: Impact, Arial, sans-serif; }
.stat-num { font-size: 32pt; font-weight: 800; font-family: Impact, Arial, sans-serif; text-shadow: 0 0 10pt currentColor; }
.text-cyan { color: #0ea5e9; } .text-blue { color: #3b82f6; } .text-purple { color: #8b5cf6; }
.text-green { color: #10b981; } .text-orange { color: #f59e0b; } .text-red { color: #ef4444; }
.text-dim { color: #64748b; } .text-white { color: #ffffff; }
.small { font-size: 9pt; } .tiny { font-size: 8pt; }
</style></head><body>
<div class="accent"></div>
<div class="content-center">
    <div style="margin-bottom:12pt"><div class="badge-bg-cyan"><p class="badge badge-cyan" style="font-size:10pt;padding:4pt 14pt">AI 赋能全链路研发</p></div></div>
    <h1 style="font-size:36pt;margin-bottom:10pt">AI Coding 研发提效总结</h1>
    <p style="font-size:13pt;margin-bottom:16pt">基于 Cursor IDE + Claude Code 双引擎驱动</p>
    <p style="font-size:11pt;margin-bottom:20pt">移动储能机器人运营中心 · 全链路独立系统研发</p>
    <div style="display:flex;gap:12pt;justify-content:center">
      <div class="badge-bg-cyan"><p class="badge badge-cyan">Cursor IDE</p></div>
      <div class="badge-bg-orange"><p class="badge badge-orange">Claude Code</p></div>
      <div class="badge-bg-purple"><p class="badge badge-purple">协作驱动</p></div>
    </div>
  </div>
</body></html>
