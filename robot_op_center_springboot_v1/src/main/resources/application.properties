server.port=8080
spring.jackson.default-property-inclusion=non_null

# 云服务对接配置
# true（默认）= 使用本地 Mock 数据；false = 通过 HTTP 调用真实云平台接口
cloud.api.mock=true

# 真实云平台配置（cloud.api.mock=false 时生效）
# 默认测试环境；生产环境使用 --spring.profiles.active=prod
# AK/SK 勿提交仓库：本地填写、或使用环境变量 CLOUD_API_AK / CLOUD_API_SK / CLOUD_API_BASE_URL
cloud.api.base-url=https://chargo-open-uat.example.com:8443
cloud.api.ak=
cloud.api.sk=
