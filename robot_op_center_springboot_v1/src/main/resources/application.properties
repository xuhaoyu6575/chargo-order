server.port=8080
spring.application.name=dashboard
spring.jackson.default-property-inclusion=non_null

# 日志：整体调试阶段统一 INFO（单包细调可改为 DEBUG，如 logging.level.org.springframework.web=DEBUG）
# 控制台与文件均为 UTF-8；请在 Cursor/VS Code 集成终端使用 UTF-8 展示（见仓库 .vscode/settings.json）
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.file.path=./logs
logging.level.root=INFO
logging.level.com.robot.op=INFO
logging.level.com.robot.op.client.http=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.apache.catalina=INFO
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB

# 云服务对接配置
# Dashboard（/api/dashboard/*）专用：true=本地 Mock；false=HTTP 调用真实云平台。不影响营收驾驶舱。
cloud.api.mock=false
# 营收驾驶舱（/api/revenue/*）：true=本地 Mock（与 Dashboard 同源内存订单）；false=HTTP 调用真实云平台（与 cloud.api.mock 无关）
revenue.api.mock=false

# 真实云平台配置（Dashboard 或营收任一侧走 cloud 时生效，见 NeedsRealCloudClientCondition）
# 凭证来源：仓库根目录 cloud_api/charge_api_info.txt（UAT）；生产请用 --spring.profiles.active=prod 并改 application-prod.properties 或环境变量覆盖
# 生产/流水线可用环境变量覆盖同名配置（Spring Boot 松散绑定，如 CLOUD_API_AK → cloud.api.ak）
cloud.api.base-url=https://chargo-open-uat.catl.com:8443
cloud.api.ak=SH-00036_00001
cloud.api.sk=a3cbaa8d474f844484a888941aedfaea